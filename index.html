function showPage(pageId) {
pageContent.innerHTML = pages[pageId] || pages.accueil;
navLinks.forEach(link => {
link.classList.toggle('active', link.getAttribute('data-page') === pageId);
});
attachNavLinksListeners();

// Show/hide speed button based on page
if (pageId === 'projets' || pageId === 'services') {
speedControl.classList.add('visible');
} else {
speedControl.classList.remove('visible');
}
}

function attachNavLinksListeners() {
document.querySelectorAll('.nav-link').forEach(link => {
link.removeEventListener('click', navClickHandler);
link.addEventListener('click', navClickHandler);
});
}

function navClickHandler(e) {
e.preventDefault();
const page = this.getAttribute('data-page');
if (page) {
showPage(page);
window.location.hash = page;
}
}

function initPageFromHash() {
const hash = window.location.hash.replace('#', '');
showPage(['accueil', 'a-propos', 'services', 'projets', 'contact'].includes(hash) ? hash : 'accueil');
}

document.addEventListener('submit', e => {
if (e.target.id === 'demo-contact-form') {
e.preventDefault();
alert('Merci de votre message. Nous vous répondrons rapidement par email ou téléphone.');
}
});

window.addEventListener('hashchange', initPageFromHash);
initPageFromHash();

// ===== SPEED CONTROL FOR SCROLLING =====
let isSpeedActive = false;

function setActiveSpeed(active) {
isSpeedActive = active;
const tracks = document.querySelectorAll('.auto-scroll-track');
tracks.forEach(track => {
if (active) {
track.classList.add('fast');
} else {
track.classList.remove('fast');
}
});
if (speedBtn) {
speedBtn.classList.toggle('active', active);
}
}

// Mouse events for desktop
if (speedBtn) {
speedBtn.addEventListener('mousedown', () => {
setActiveSpeed(true);
});

speedBtn.addEventListener('mouseup', () => {
setActiveSpeed(false);
});

speedBtn.addEventListener('mouseleave', () => {
if (isSpeedActive) {
setActiveSpeed(false);
}
});

// Touch events for mobile
speedBtn.addEventListener('touchstart', (e) => {
e.preventDefault();
setActiveSpeed(true);
});

speedBtn.addEventListener('touchend', (e) => {
e.preventDefault();
setActiveSpeed(false);
});
}

// Pause animation on hover over scroll cards
document.addEventListener('mouseenter', function(e) {
if (e.target.closest('.scroll-card') || e.target.closest('.scroll-img')) {
const track = e.target.closest('.auto-scroll-wrapper')?.querySelector('.auto-scroll-track');
if (track && !isSpeedActive) {
track.style.animationPlayState = 'paused';
}
}
}, true);

document.addEventListener('mouseleave', function(e) {
if (e.target.closest('.scroll-card') || e.target.closest('.scroll-img')) {
const track = e.target.closest('.auto-scroll-wrapper')?.querySelector('.auto-scroll-track');
if (track) {
track.style.animationPlayState = 'running';
}
}
}, true);

// Reset animations when changing page
function resetAllAnimations() {
const tracks = document.querySelectorAll('.auto-scroll-track');
tracks.forEach(track => {
track.style.animationPlayState = 'running';
track.classList.remove('fast');
});
setActiveSpeed(false);
}

window.addEventListener('hashchange', function() {
resetAllAnimations();
});

})();
</script>

debarrasTrack.style.animationPlayState = currentAnimation === 'paused' ? 'running' : 'paused';
}

});

function resetAllAnimations() {
